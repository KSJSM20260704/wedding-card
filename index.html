<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성민이와 수정이의 결혼식에 초대합니다</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <meta name="format-detection" content="telephone=no">
    <style>
        /* --- 폰트 정의 --- */
        @font-face {
            font-family: 'DarrelAllura';
            src: url('fonts/DarrelAllura.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Aston';
            src: url('fonts/Aston.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Noracle';
            src: url('fonts/Noracle.otf') format('truetype');
        }

        @font-face {
            font-family: 'Mermaid';
            src: url('fonts/Mermaid.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Hello Bride Script';
            src: url('fonts/Hello Bride Script.ttf') format('truetype');
        }

        @font-face {
            font-family: 'BookkMyungjo-Bd';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2302@1.0/BookkMyungjo-Bd.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
        }

        :root {
            --sea-deep-blue: #015871;
            --coral-pink: #F1948A;
            --text-dark: #2C3E50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'BookkMyungjo-Bd', sans-serif;
            color: var(--text-dark);
            background: linear-gradient(180deg, #e0f7fa 0%, #b2bbf2 100%);
            touch-action: manipulation;
        }

        body {
            font-size: clamp(13px, 2.5vw, 16px);
        }

        /* 각 섹션의 제목 (Invitation, Our Moments 등) */
        .title {
            font-size: clamp(2.2rem, 7vw, 2.8rem);
        }

        /* 초대글의 신랑/신부 이름 */
        .names {
            font-size: clamp(1rem, 3vw, 1.1rem);
        }

        .names strong {
            font-size: 1.1em; /* 부모 크기에 비례해서 커지도록 설정 */
        }

        /* 마음 전하기의 계좌 정보 제목 */
        #contact .account-info h4 {
            font-size: clamp(1.1rem, 3.5vw, 1.2rem);
        }

        /* 맨 아래쪽 푸터(바닥글) */
        footer {
            font-size: clamp(0.8rem, 2vw, 0.9rem);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
        }

        .content-wrapper {
            position: relative;
            z-index: 2;
            background: linear-gradient(180deg, rgba(252, 255, 254, 0.88) 0%, rgb(248, 253, 255) 100%);
        }

        /* --- 인트로 --- */
        #intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column; /* 콘텐츠 세로 정렬 */
            justify-content: center;
            align-items: center;
            z-index: 101;
            opacity: 1;
            transition: opacity 1s ease-out, visibility 1s linear 1s; /* fade-out 트랜지션 */
            visibility: visible;
            overflow: hidden;
            background: linear-gradient(to bottom, oklch(60% 0.2 230), oklch(0.761 0.113 248.784));
            cursor: pointer;
        }

        #intro.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* --- Underwater Background --- */
        #underwater-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            --ratioW: 1;
        }

        #underwater-background * {
            box-sizing: border-box;
        }

        #underwater-background *::before, #underwater-background *::after {
            box-sizing: border-box;
        }

        #underwater-background #surface {
            mix-blend-mode: overlay;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        #underwater-background #surface::before, #underwater-background #surface::after {
            content: "";
            display: block;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url("images/wave.jpeg");
            background-repeat: repeat-x;
            --duration: 8s;
            --lowHeight: 30vh;
            --highHeight: 70vh;
            --layerNum: 2;
            --index: 0;
            --opacity: 0.4;
            animation: surface var(--duration) linear infinite;
            animation-delay: calc((var(--duration) / var(--layerNum)) * var(--index) * -1);
            opacity: 0;
            mask-image: linear-gradient(to top, white, transparent var(--lowHeight));
        }

        #underwater-background #surface::before {
            --index: 0;
            transform: scale3d(1, -1, 1);
        }

        #underwater-background #surface::after {
            --index: 1;
            transform: scale3d(-1, -1, 1);
        }

        #underwater-background #caustics {
            position: fixed;
            bottom: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
        }

        #underwater-background #caustics::before, #underwater-background #caustics::after {
            content: "";
            display: block;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url("images/surface.jpeg");
            background-repeat: repeat;
            --duration: 10s;
            --gapY: 0px;
            background-size: calc(100vw / var(--ratioW)) 30vh;
            animation: caustics calc(var(--duration) * (var(--ratioW))) linear infinite;
            opacity: 0.3;
            mask-image: linear-gradient(to top, white, transparent, transparent, transparent);
        }

        #underwater-background #caustics::after {
            --duration: 11s;
            --gapY: 10vh;
            animation-delay: -2s;
            transform: scale3d(-1, 1, 1);
        }

        #underwater-background #sun {
            mix-blend-mode: overlay;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        #underwater-background #sun div {
            content: "";
            display: block;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: 50vw 0;
            animation: sun 7s ease infinite alternate;
            mask-image: linear-gradient(to bottom, transparent 15%, white 50%, white 55%, transparent 80%);
        }

        #underwater-background #sun #sun_layer1 {
            background: linear-gradient(to right, transparent 39%, white 40%, transparent 41%, transparent 48.5%, white 50%, transparent 51.5%, transparent 53%, white 54%, transparent 55%, transparent 70%, white 71%, transparent 72%);
        }

        #underwater-background #sun #sun_layer2 {
            animation-delay: -2s;
            animation-duration: 7.8s;
            animation-direction: alternate-reverse;
            background: linear-gradient(to right, transparent 32%, white 33%, transparent 34%, transparent 38%, white 39%, transparent 40%, transparent 53%, white 54%, transparent 55%, transparent 63.5%, white 65%, transparent 66.5%);
        }

        #underwater-background #sun #sun_layer3 {
            animation-delay: -5s;
            animation-duration: 8.5s;
            background: linear-gradient(to right, transparent 38.5%, white 40%, transparent 41.5%, transparent 47%, white 48%, transparent 49%, transparent 52%, white 53%, transparent 54%, transparent 60%, white 61%, transparent 62%);
        }

        @keyframes surface {
            0% {
                opacity: 0;
                background-position: center bottom;
                background-size: 100% var(--highHeight);
            }
            20% {
                opacity: var(--opacity);
            }
            100% {
                opacity: 0;
                background-position: center bottom calc(-1 * var(--lowHeight));
                background-size: 100% var(--lowHeight);
            }
        }

        @keyframes caustics {
            0% {
                background-position: bottom var(--gapY) left;
            }
            100% {
                background-position: bottom var(--gapY) left -100vw;
            }
        }

        @keyframes sun {
            0% {
                opacity: 0.1;
                transform: skew(5deg) scale3d(3, 1.5, 1);
            }
            50% {
                opacity: 0.08;
                transform: skew(0deg) scale3d(1.5, 1, 1);
            }
            100% {
                opacity: 0.1;
                transform: skew(-5deg) scale3d(3, 1, 1);
            }
        }

        @media (orientation: portrait) {
            #underwater-background {
                --ratioW: 1;
            }
        }

        @media (min-aspect-ratio: 1/1) {
            #underwater-background {
                --ratioW: 1;
            }
        }

        @media (min-aspect-ratio: 2/1) {
            #underwater-background {
                --ratioW: 2;
            }
        }

        @media (min-aspect-ratio: 3/1) {
            #underwater-background {
                --ratioW: 3;
            }
        }

        @media (min-aspect-ratio: 4/1) {
            #underwater-background {
                --ratioW: 4;
            }
        }

        @media (min-aspect-ratio: 5/1) {
            #underwater-background {
                --ratioW: 5;
            }
        }

        /* --- 물거품 효과 --- */
        #bubble-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 120;
            pointer-events: none;
        }

        .bubble {
            pointer-events: auto;
            position: absolute;
            bottom: -30px;
            border-radius: 50%;
            opacity: 10;
            border: 2.5px solid transparent;
            animation: rise 6s infinite ease-in;
            z-index: 1001;

            background: linear-gradient(transparent, transparent),
            radial-gradient(circle at top left, #e0c8c8, #b9d6f8, #efefbf);

            background-origin: border-box;
            background-clip: padding-box, border-box;
            mix-blend-mode: multiply;
        }

        @keyframes rise {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-120vh) translateX(30px);
                opacity: 0;
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.8;
            }
            100% {
                transform: scale(0.9);
                opacity: 0;
            }
        }

        .bubble-fragment {
            background: white;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: fixed;
            z-index: 121;
        }

        /* --- 인트로 콘텐츠 --- */
        #intro-content {
            position: relative;
            z-index: 1;
            text-align: center;
            line-height: 1.3;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            font-family: 'Hello Bride Script', cursive;
            font-size: 6.8rem;
        }

        body.no-scroll {
            overflow: hidden;
        }

        .fade-in-text {
            font-family: 'Hello Bride Script', cursive;
            font-size: clamp(5rem, 10vw, 9rem);
            line-height: 1.3;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .fade-in-text .line {
            color: transparent;
        }

        .fade-in-text .line span {
            opacity: 0;
            color: #fff;
            display: inline-block;
            animation: fadeIn-inplace 0.8s ease-out forwards;
        }

        @keyframes fadeIn-inplace {
            to {
                opacity: 1;
                transform: none;
            }
        }

        /* --- 메인 --- */
        #main-photo {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            margin-top: -30px
        }

        #main-title-area {
            text-align: center;
            margin-top: 40px;
        }

        #main-title-area .location {
            font-family: 'Noracle', sans-serif;
            font-size: 2em;
            color: var(--sea-deep-blue);
            font-weight: 600;
        }

        #main-title-area .small-text {
            font-size: 0.8em;
            font-weight: 10;
        }

        #main-title-area h1 {
            font-family: 'DarrelAllura', cursive;
            color: var(--sea-deep-blue);
            text-shadow: 0 1px 3px rgba(255, 255, 255, 0.7);
            white-space: nowrap;
            font-size: clamp(2.8rem, 12vw, 4.5rem);
            font-weight: normal;
        }

        .invitation-text-wrapper {
            position: relative;
            padding: 40px 20px;
            margin-top: 20px;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            border-top: 2px solid rgba(241, 148, 138, 0.3);
            border-bottom: 2px solid rgba(241, 148, 138, 0.3);
        }

        .divider {
            width: 140px;
            height: 2px;
            background-color: rgba(241, 148, 138, 0.4);
            margin: 40px auto;
        }

        #invitation .names {
            margin-top: 10px;
        }

        .content-section {
            padding: 80px 30px;
        }

        .title {
            font-family: 'Aston', cursive;
            font-size: 2.5rem;
            font-weight: normal;
            color: var(--sea-deep-blue);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .title-icon {
            width: 26px;
            height: 26px;
            vertical-align: middle;
            margin: 0 8px;
            transform: translateY(-3px);
            filter: saturate(88%) brightness(156%) contrast(100%) hue-rotate(360deg);
        }

        #invitation p,
        #invitation .names,
        #location p {
            line-height: 1.8;
            text-align: center;
        }

        .names {
            margin-top: 40px;
            font-size: 1.1rem;
        }

        .names strong {
            font-size: 1.2rem;
            font-weight: 700;
        }

        /*--- 오시는 길 안내 ---*/
        .guidance-container {
            margin-top: 50px;
            text-align: left;
        }

        .guidance-section {
            background-color: rgba(248, 250, 252, 0.7);
            border: 1px solid #e8e8e8;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.04);
            backdrop-filter: blur(5px);
        }

        .guidance-section h3 {
            font-size: 1.25em;
            color: var(--sea-deep-blue);
            margin: -30px -30px 25px -30px;
            padding: 20px 30px;
            background-color: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid #e8e8e8;
            border-radius: 15px 15px 0 0;
            display: flex;
            align-items: center;
        }

        .guidance-section h3::before {
            font-family: 'Aston', cursive;
            font-size: 1.2em;
            color: var(--coral-pink);
            margin-right: 14px;
            font-weight: bold;
        }

        /*--- 캘린더 섹션 ---*/
        .calendar-container {
            position: relative;
            margin-top: 30px;
            padding: 30px 25px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .calendar-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .calendar-header h3 {
            font-family: 'BookkMyungjo-Bd', serif;
            font-size: 1.6em;
            color: var(--text-dark);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }

        .day-name {
            font-size: 0.85em;
            font-weight: 700;
            color: #999;
            padding-bottom: 10px;
        }

        .day {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 60px;
            font-size: 1em;
            border-radius: 50%;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .day.other-month {
            color: #ccc;
        }

        .day-name.sun, .day.sun {
            color: #E74C3C;
        }

        .day-name.sat, .day.sat {
            color: #3498DB;
        }

        .day.sat.other-month {
            color: #a9d4ee;
        }
        .day.sun.other-month {
            color: #f1a9a9;
        }

        .day.special-day {
            background-color: var(--coral-pink);
            color: white !important;
            font-weight: 700;
            transform: scale(1.05);
            box-shadow: 3px 4px 12px rgba(241, 148, 138, 0.6);
            width: 38px;
            height: 42px;
